name: "Claude Security Review"

# ---------------------------------------------------------------------------
# Semantic / business-logic security review by Claude. Runs as a REQUIRED
# check on the develop -> main PR. Complements CodeQL: catches auth-logic
# flaws and intent-level issues that pattern-based SAST cannot see.
#
# PREREQUISITE: repo secret CLAUDE_API_KEY (Anthropic Console), enabled for
# BOTH "Claude API" AND "Claude Code" usage. Set a spend cap on the key.
#
# SAFETY: uses `pull_request` (not pull_request_target); secrets are never
# exposed to fork code. Only trusted PRs (yours, from develop) are reviewed.
# ---------------------------------------------------------------------------

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: claude-sec-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  security-review:
    name: Claude semantic security review
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - name: Run Claude security review
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          comment-pr: true
          claude-model: claude-sonnet-5
          exclude-directories: "node_modules,dist,build,.vite,coverage"

      # ---- HARD GATE ----------------------------------------------------------
      # Fail the PR check when the review reports any High/Critical finding, so the
      # promotion auto-merge cannot complete. This is intentionally strict: for a
      # citizen-developer pipeline where code arrives unreviewed from Lovable, a
      # serious finding must stop the deploy rather than merely comment on it.
      #
      # The action writes its findings to a JSON file; the exact name has changed
      # across releases, so we locate it rather than hard-code it. If NO results
      # file is produced, we FAIL CLOSED — a silently-missing report must not be
      # read as "no findings".
      - name: Block on High/Critical findings
        if: always()
        run: |
          set -euo pipefail

          FILE="$(find . -maxdepth 3 -type f \
                    \( -name 'claudecode-results.json' -o -name '*claude*results*.json' \) \
                    2>/dev/null | head -n1 || true)"

          if [ -z "${FILE:-}" ]; then
            echo "::error::Security review produced no results file; failing closed."
            exit 1
          fi
          echo "Reading findings from: $FILE"

          COUNT=$(jq '[.findings[]?
                        | select((.severity // "" | ascii_downcase) as $s
                                 | $s == "high" or $s == "critical")] | length' "$FILE")
          echo "High/Critical findings: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "::error::Blocking merge: $COUNT high/critical security finding(s). See PR comments."
            exit 1
          fi
      # -------------------------------------------------------------------------
